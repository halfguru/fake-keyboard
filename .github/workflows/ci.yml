name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build, Test, and Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libbluetooth-dev libsystemd-dev
          
          # Install latest sdbus-c++ from source
          git clone --depth 1 https://github.com/Kistler-Group/sdbus-cpp.git /tmp/sdbus-cpp
          cd /tmp/sdbus-cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_LIB_SYSTEMD=OFF
          cmake --build build -j$(nproc)
          sudo cmake --install build
      
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: build
      
      - uses: egor-tensin/setup-clang@v2
        with:
          version: 21
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - uses: conan-io/setup-conan@v1
      
      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-
      
      - name: Install Conan dependencies
        run: conan install . --output-folder=build --build=missing
      
      - name: Configure CMake
        run: cmake --preset dev-release
      
      - name: Format check
        uses: jidicula/clang-format-action@v4.17.0
        with:
          clang-format-version: '21'
          check-path: '.'
          exclude-regex: 'build/.*'
      
      # TODO: Re-enable when CI has proper C++23 support
      # clang-tidy fails because Ubuntu's libstdc++ lacks std::expected
      # - name: Run clang-tidy
      #   run: run-clang-tidy -p build
      
      - name: Build
        run: cmake --build --preset dev-release
      
      - name: Run tests
        run: ctest --preset dev-release
