name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install clang-format
        run: sudo apt-get install -y clang-format
      
      - name: Check formatting
        run: |
          find src tests -name "*.cpp" -o -name "*.hpp" | xargs clang-format --dry-run --Werror

  tidy:
    name: Clang-Tidy
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 clang-tidy-17 cmake ninja-build pkg-config libbluetooth-dev
          pip install conan
          echo "CXX=clang++-17" >> $GITHUB_ENV
      
      - name: Setup Conan profile
        run: conan profile detect
      
      - name: Install Conan dependencies
        run: conan install . --output-folder=build --build=missing
      
      - name: Configure CMake
        run: cmake --preset dev-release
      
      - name: Run clang-tidy
        run: run-clang-tidy-17 -p build

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: tidy
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 cmake pkg-config libbluetooth-dev
          pip install conan
      
      - name: Setup Conan profile
        run: conan profile detect
      
      - name: Install Conan dependencies
        run: |
          conan install . --output-folder=build --build=missing
      
      - name: Configure CMake
        run: cmake --preset dev-release
      
      - name: Build
        run: cmake --build --preset dev-release
      
      - name: Run tests
        run: ctest --preset dev-release
